name: Deploy to Cloud Run

on:
  workflow_dispatch:
    inputs:
      application:
        description: "Application to deploy"
        required: true
        type: choice
        options:
          - reader
          - admin
          - search-token-worker
          - image-cleanup-worker
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stg
          - prd
      tag:
        description: "Image tag (defaults to git SHA)"
        required: false
        type: string

env:
  REGION: asia-northeast1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate input combination
        env:
          APPLICATION: ${{ inputs.application }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          if [ "${APPLICATION}" = "reader" ] && [ "${ENVIRONMENT}" = "prd" ]; then
            echo "::error::reader cannot be deployed to prd environment"
            exit 1
          fi
          if [ "${APPLICATION}" = "image-cleanup-worker" ] && [ "${ENVIRONMENT}" = "stg" ]; then
            echo "::error::image-cleanup-worker cannot be deployed to stg environment"
            exit 1
          fi

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${REGION}-docker.pkg.dev

      - name: Set deployment variables
        id: vars
        env:
          INPUT_TAG: ${{ inputs.tag }}
          INPUT_APPLICATION: ${{ inputs.application }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          GIT_SHA: ${{ github.sha }}
        run: |
          TAG="${INPUT_TAG}"
          if [ -z "${TAG}" ]; then
            TAG="${GIT_SHA}"
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"

          ENV="${INPUT_ENVIRONMENT}"

          case "${INPUT_APPLICATION}" in
            reader)
              echo "service_name=hut-stg-reader" >> "${GITHUB_OUTPUT}"
              echo "dockerfile=applications/frontend/Dockerfile" >> "${GITHUB_OUTPUT}"
              echo "context=applications/frontend" >> "${GITHUB_OUTPUT}"
              echo "app_type=frontend" >> "${GITHUB_OUTPUT}"
              echo "app_name=reader" >> "${GITHUB_OUTPUT}"
              echo "app_port=3000" >> "${GITHUB_OUTPUT}"
              ;;
            admin)
              if [ "${ENV}" = "prd" ]; then
                echo "service_name=hut-prd-admin" >> "${GITHUB_OUTPUT}"
              else
                echo "service_name=hut-stg-admin" >> "${GITHUB_OUTPUT}"
              fi
              echo "dockerfile=applications/frontend/Dockerfile" >> "${GITHUB_OUTPUT}"
              echo "context=applications/frontend" >> "${GITHUB_OUTPUT}"
              echo "app_type=frontend" >> "${GITHUB_OUTPUT}"
              echo "app_name=admin" >> "${GITHUB_OUTPUT}"
              echo "app_port=3001" >> "${GITHUB_OUTPUT}"
              ;;
            search-token-worker)
              if [ "${ENV}" = "prd" ]; then
                echo "service_name=search-token-worker" >> "${GITHUB_OUTPUT}"
              else
                echo "service_name=stg-search-token-worker" >> "${GITHUB_OUTPUT}"
              fi
              echo "dockerfile=applications/search-token-worker/Dockerfile" >> "${GITHUB_OUTPUT}"
              echo "context=applications/search-token-worker" >> "${GITHUB_OUTPUT}"
              echo "app_type=worker" >> "${GITHUB_OUTPUT}"
              echo "app_name=search-token-worker" >> "${GITHUB_OUTPUT}"
              echo "app_port=8080" >> "${GITHUB_OUTPUT}"
              ;;
            image-cleanup-worker)
              echo "service_name=image-cleanup-worker" >> "${GITHUB_OUTPUT}"
              echo "dockerfile=applications/image-cleanup-worker/Dockerfile" >> "${GITHUB_OUTPUT}"
              echo "context=applications/image-cleanup-worker" >> "${GITHUB_OUTPUT}"
              echo "app_type=worker" >> "${GITHUB_OUTPUT}"
              echo "app_name=image-cleanup-worker" >> "${GITHUB_OUTPUT}"
              echo "app_port=8080" >> "${GITHUB_OUTPUT}"
              ;;
          esac

      - name: Prepare GCP credentials for Docker build
        id: docker-creds
        if: steps.vars.outputs.app_type == 'frontend'
        env:
          GCP_CRED_FILE: ${{ steps.gcp-auth.outputs.credentials_file_path }}
        run: |
          CRED_FILE="${GCP_CRED_FILE}"
          TOKEN_FILE=$(python3 -c "
          import json
          with open('${CRED_FILE}') as f:
              cred = json.load(f)
          print(cred.get('credential_source', {}).get('file', ''))
          ")

          if [ -n "${TOKEN_FILE}" ] && [ -f "${TOKEN_FILE}" ]; then
            python3 -c "
          import json
          with open('${CRED_FILE}') as f:
              cred = json.load(f)
          cred['credential_source']['file'] = '/tmp/gcp-oidc-token'
          with open('/tmp/docker-gcp-creds.json', 'w') as f:
              json.dump(cred, f)
          "
            echo "cred_file=/tmp/docker-gcp-creds.json" >> "${GITHUB_OUTPUT}"
            echo "token_file=${TOKEN_FILE}" >> "${GITHUB_OUTPUT}"
          else
            echo "cred_file=${CRED_FILE}" >> "${GITHUB_OUTPUT}"
            echo "token_file=" >> "${GITHUB_OUTPUT}"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        id: build
        with:
          context: ${{ steps.vars.outputs.context }}
          file: ${{ steps.vars.outputs.dockerfile }}
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/hut-${{ inputs.environment }}/${{ inputs.application }}:${{ steps.vars.outputs.tag }}
          cache-from: type=gha,scope=${{ inputs.application }}
          cache-to: type=gha,mode=max,scope=${{ inputs.application }}
          secret-files: |
            gcp_credentials=${{ steps.docker-creds.outputs.cred_file }}
            ${{ steps.docker-creds.outputs.token_file != '' && format('gcp_oidc_token={0}', steps.docker-creds.outputs.token_file) || '' }}
          build-args: |
            ${{ steps.vars.outputs.app_type == 'frontend' && format('APP_NAME={0}', steps.vars.outputs.app_name) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('APP_PORT={0}', steps.vars.outputs.app_port) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('NEXT_PUBLIC_FIREBASE_PROJECT_ID={0}', secrets.GCP_PROJECT_ID) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('NEXT_PUBLIC_FIREBASE_API_KEY={0}', secrets.FIREBASE_API_KEY) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN={0}', secrets.FIREBASE_AUTH_DOMAIN) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET={0}', secrets.FIREBASE_STORAGE_BUCKET) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID={0}', secrets.FIREBASE_MESSAGING_SENDER_ID) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('NEXT_PUBLIC_FIREBASE_APP_ID={0}', secrets.FIREBASE_APP_ID) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('SERVER_ACTIONS_ALLOWED_ORIGINS={0}', secrets.SERVER_ACTIONS_ALLOWED_ORIGINS) || '' }}
            ${{ steps.vars.outputs.app_type == 'frontend' && format('IMAGE_REMOTE_PATTERNS={0}', secrets.IMAGE_REMOTE_PATTERNS) || '' }}

      - name: Deploy to Cloud Run
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          INPUT_ENVIRONMENT: ${{ inputs.environment }}
          INPUT_APPLICATION: ${{ inputs.application }}
          APP_TYPE: ${{ steps.vars.outputs.app_type }}
          APP_PORT: ${{ steps.vars.outputs.app_port }}
          SERVICE_NAME: ${{ steps.vars.outputs.service_name }}
          IMAGE_TAG: ${{ steps.vars.outputs.tag }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/hut-${INPUT_ENVIRONMENT}/${INPUT_APPLICATION}:${IMAGE_TAG}"

          DEPLOY_ARGS=(
            --image "${IMAGE}"
            --port "${APP_PORT}"
            --region "${REGION}"
            --project "${GCP_PROJECT_ID}"
          )

          if [ "${APP_TYPE}" = "frontend" ]; then
            DEPLOY_ARGS+=(
              --update-env-vars "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${GCP_PROJECT_ID},NEXT_PUBLIC_USE_FIREBASE_EMULATOR=false"
            )
          fi

          gcloud run services update "${SERVICE_NAME}" \
            "${DEPLOY_ARGS[@]}"
