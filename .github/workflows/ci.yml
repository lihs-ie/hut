name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FIREBASE_COMPOSE_FILE: applications/docker/docker-compose.yaml

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: ./.github/actions/setup-frontend

      - name: Lint
        run: pnpm lint
        working-directory: applications/frontend

      - name: Start Firebase Emulator
        run: |
          docker compose -f ${{ env.FIREBASE_COMPOSE_FILE }} up -d
          echo "Waiting for Firestore Emulator (port 8085)..."
          timeout 120 bash -c 'until curl -s http://localhost:8085 > /dev/null 2>&1; do sleep 2; done'
          echo "Firestore Emulator is ready"

      - name: Seed test data
        run: pnpm exec tsx ../scripts/seed/index.ts
        working-directory: applications/frontend

      - name: Build
        run: pnpm build
        working-directory: applications/frontend
        env:
          NEXT_PUBLIC_USE_FIREBASE_EMULATOR: "true"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-hut

      - name: Stop Firebase Emulator
        if: always()
        run: docker compose -f ${{ env.FIREBASE_COMPOSE_FILE }} down

      - name: Test
        run: pnpm test:coverage
        working-directory: applications/frontend

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: applications/frontend/coverage/

      - name: Coverage Summary
        if: always() && hashFiles('applications/frontend/coverage/coverage-summary.json') != ''
        run: |
          SUMMARY=$(cat applications/frontend/coverage/coverage-summary.json)
          LINES=$(echo "$SUMMARY" | jq '.total.lines.pct')
          STATEMENTS=$(echo "$SUMMARY" | jq '.total.statements.pct')
          FUNCTIONS=$(echo "$SUMMARY" | jq '.total.functions.pct')
          BRANCHES=$(echo "$SUMMARY" | jq '.total.branches.pct')
          {
            echo "## Coverage Summary"
            echo "| Metric | Coverage |"
            echo "|--------|----------|"
            echo "| Lines | ${LINES}% |"
            echo "| Statements | ${STATEMENTS}% |"
            echo "| Functions | ${FUNCTIONS}% |"
            echo "| Branches | ${BRANCHES}% |"
          } >> "$GITHUB_STEP_SUMMARY"
