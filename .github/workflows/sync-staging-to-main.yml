name: Sync staging to main

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: sync-staging-to-main
  cancel-in-progress: false

jobs:
  create-pr:
    name: Create or update staging→main PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Create or update PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set -e

          ahead=$(git rev-list --count origin/main..origin/staging)
          if [ "${ahead}" -eq 0 ]; then
            echo "staging has no new commits ahead of main. Skipping PR creation."
            exit 0
          fi

          pr_numbers=$(git log origin/main..origin/staging --merges --reverse --pretty=format:'%s' \
            | grep -oE 'Merge pull request #[0-9]+' \
            | grep -oE '[0-9]+' || true)
          prs=""
          pr_count=0
          for num in ${pr_numbers}; do
            title=$(gh pr view "${num}" --json title --jq .title 2>/dev/null || echo "(取得失敗)")
            prs+="- #${num}: ${title}"$'\n'
            pr_count=$((pr_count + 1))
          done
          if [ -z "${prs}" ]; then
            prs="(該当 PR なし)"
          else
            prs=${prs%$'\n'}
          fi

          body=$(cat <<EOF
          ## 概要
          \`staging\` ブランチを \`main\` に同期する自動生成 PR。

          ## 含まれる PR (${pr_count} 件 / ahead ${ahead})

          ${prs}

          ## マージ前確認事項
          - [ ] CI / E2E が pass している
          - [ ] release-please workflow が走るタイミングを意識する

          ---
          この PR は \`Sync staging to main\` workflow が staging への push 時に自動生成・更新する。
          EOF
          )

          existing=$(gh pr list --base main --head staging --state open --json number --jq '.[0].number // empty')
          if [ -n "${existing}" ]; then
            echo "PR #${existing} already exists. Updating body."
            gh pr edit "${existing}" --body "${body}"
          else
            echo "Creating new staging→main PR"
            gh pr create \
              --base main \
              --head staging \
              --title "chore: sync staging to main" \
              --body "${body}"
          fi
