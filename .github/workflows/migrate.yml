name: Run Migration

on:
  workflow_dispatch:
    inputs:
      migration:
        description: "Migration to run"
        required: true
        type: choice
        options:
          - initial-data
          - patch-published-at
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - stg
          - prd
      dry_run:
        description: "Dry run (no writes)"
        required: false
        type: boolean
        default: true

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install dependencies
        working-directory: applications/scripts
        run: npm install

      - name: Run migration
        working-directory: applications/scripts
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          INPUT_MIGRATION: ${{ inputs.migration }}
          DRY_RUN_FLAG: ${{ inputs.dry_run && '--dry-run' || '' }}
        run: |
          if [ -n "${DRY_RUN_FLAG}" ]; then
            npx tsx "migrate/${INPUT_MIGRATION}.ts" "${DRY_RUN_FLAG}"
          else
            npx tsx "migrate/${INPUT_MIGRATION}.ts"
          fi
